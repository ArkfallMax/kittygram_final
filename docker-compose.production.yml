# version: '3'

volumes:
  pg_data_production:
  static_volume:
  media_volume:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: pymax89/kittygram_backend
    env_file: .env
    volumes:
      - static_volume:/backend_static
      - media_volume:/app/media/
    depends_on:
      - db
  frontend:
    image: pymax89/kittygram_frontend
    env_file: .env
    command: cp -r /app/build/. /static/
    volumes:
      - static_volume:/static
  gateway:
    image: pymax89/kittygram_gateway
    env_file: .env
    depends_on:
      backend:
        condition: service_started
    ports:
      - 9000:80
    volumes:
      - static_volume:/static
      - media_volume:/media
